exec-once = ambxst

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgb(edc3c1)
    col.inactive_border = rgb(2c2a38)
    layout = dwindle
}

decoration {
    rounding = 16
    active_opacity = 1.00
    inactive_opacity = 1.00
    shadow {
        enabled = true
        range = 8
        color = rgba(00000080)
    }
    blur {
        enabled = true
        size = 4
        passes = 2
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.4, 0.0, 0.2, 1.0
    animation = windows, 1, 2.5, myBezier, popin 80%
    animation = border, 1, 2.5, myBezier
    animation = fade, 1, 2.5, myBezier
    animation = workspaces, 1, 2.5, myBezier, slidefade 20%
}

